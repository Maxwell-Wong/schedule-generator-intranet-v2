name: Build Windows Executable

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'config.ini'
      - 'requirements.txt'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Verify all Python files exist
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "Checking required Python files..."
        $requiredFiles = @(
          "main.py",
          "ai_client.py",
          "data_processor.py",
          "excel_generator.py",
          "formatters.py",
          "output_metadata.py"
        )

        foreach ($file in $requiredFiles) {
          if (Test-Path $file) {
            Write-Host "[OK] Found: $file"
          } else {
            Write-Host "[ERROR] Missing: $file"
            exit 1
          }
        }

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verify imports work
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "Testing Python imports..."
        python -c "import output_metadata; print('[OK] output_metadata imported')"
        python -c "import formatters; print('[OK] formatters imported')"
        python -c "import excel_generator; print('[OK] excel_generator imported')"
        python -c "import data_processor; print('[OK] data_processor imported')"
        python -c "import ai_client; print('[OK] ai_client imported')"

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --clean `
          --add-data "prompts;prompts" `
          --add-data "data;data" `
          --hidden-import openpyxl `
          --hidden-import pandas `
          --hidden-import openai `
          --hidden-import configparser `
          --hidden-import output_metadata `
          --hidden-import formatters `
          --hidden-import excel_generator `
          --hidden-import data_processor `
          --hidden-import ai_client `
          --collect-all openpyxl `
          --collect-all pandas `
          --name ScheduleGenerator `
          --console `
          --log-level DEBUG `
          main.py

    - name: Verify executable was created
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        if (Test-Path "dist\ScheduleGenerator.exe") {
          Write-Host "[OK] Executable created successfully"
          Get-Item "dist\ScheduleGenerator.exe" | Select-Object Name, Length
        } else {
          Write-Host "[ERROR] Executable not found"
          exit 1
        }

    - name: Test executable
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "Testing executable..."

        # 创建测试环境目录结构
        mkdir test_environment -Force
        cd test_environment

        # 创建子目录
        mkdir data -Force
        mkdir prompts -Force

        # 复制必要的文件
        copy ..\dist\ScheduleGenerator.exe .

        # 创建测试 config.ini
        $configContent = "[paths]" + "`r`n"
        $configContent += "input_file = data/sheet_input.xlsx" + "`r`n"
        $configContent += "output_file = output_transformed.xlsx" + "`r`n"
        $configContent += "`r`n"
        $configContent += "[api]" + "`r`n"
        $configContent += "api_key = test_key_for_validation" + "`r`n"
        $configContent += "base_url = https://api.example.com/v1" + "`r`n"
        $configContent += "model = test-model" + "`r`n"
        $configContent += "max_tokens = 80000" + "`r`n"
        $configContent += "`r`n"
        $configContent += "[settings]" + "`r`n"
        $configContent += "enable_ai_modify = true" + "`r`n"
        $configContent += "thursday_person_count = 6" + "`r`n"
        $configContent += "`r`n"
        $configContent += "[filter]" + "`r`n"
        $configContent += "removed_status = Removed" + "`r`n"
        $configContent += "removed_teams = Team1,Team2,Team3" + "`r`n"
        $configContent += "remove_serial_column = true" + "`r`n"

        $configContent | Out-File -FilePath "config.ini" -Encoding UTF8

        Write-Host "[OK] Test environment created"

        # 测试可执行文件（验证能读取配置文件）
        $output = & ".\ScheduleGenerator.exe" 2>&1 | Tee-Object -Variable output
        Write-Host "Exit code: $LASTEXITCODE"

        # 检查是否成功读取配置文件（即使没有输入文件）
        if ($output -match "Configuration loaded") {
          Write-Host "[OK] Executable successfully loaded configuration"
          Write-Host "[OK] Validation PASSED - executable can read config.ini"
          $testPassed = $true
        } else {
          Write-Host "[ERROR] Failed to load configuration"
          $testPassed = $false
        }

        # 清理测试环境
        cd ..
        Remove-Item -Recurse -Force test_environment -ErrorAction SilentlyContinue

        # 根据测试结果返回退出码
        if ($testPassed) {
          Write-Host "[SUCCESS] All tests passed"
          exit 0
        } else {
          Write-Host "[FAILURE] Tests failed"
          exit 1
        }

    - name: Create deployment package
      run: |
        mkdir deployment
        copy dist\ScheduleGenerator.exe deployment\
        copy config.ini.example deployment\
        copy README_CN.md deployment\
        copy WINDOWS_README.md deployment\
        copy CONFIGURATION.md deployment\
        xcopy prompts deployment\prompts\ /E /I
        xcopy data deployment\data\ /E /I

    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScheduleGenerator-Windows
        path: deployment/
        retention-days: 30

    - name: Upload exe separately
      uses: actions/upload-artifact@v4
      with:
        name: ScheduleGenerator-exe-only
        path: dist/ScheduleGenerator.exe
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/main/warn-main.txt
          build/main/error-main.txt
        retention-days: 7
