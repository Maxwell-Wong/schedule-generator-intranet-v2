name: Release

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Verify all Python files exist
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "Checking required Python files..."
        $requiredFiles = @(
          "main.py",
          "ai_client.py",
          "data_processor.py",
          "excel_generator.py",
          "formatters.py",
          "output_metadata.py"
        )

        foreach ($file in $requiredFiles) {
          if (Test-Path $file) {
            Write-Host "[OK] Found: $file"
          } else {
            Write-Host "[ERROR] Missing: $file"
            exit 1
          }
        }

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verify imports work
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "Testing Python imports..."
        python -c "import output_metadata; print('[OK] output_metadata imported')"
        python -c "import formatters; print('[OK] formatters imported')"
        python -c "import excel_generator; print('[OK] excel_generator imported')"
        python -c "import data_processor; print('[OK] data_processor imported')"
        python -c "import ai_client; print('[OK] ai_client imported')"

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --clean `
          --add-data "config.ini;." `
          --add-data "prompts;prompts" `
          --add-data "data;data" `
          --hidden-import openpyxl `
          --hidden-import pandas `
          --hidden-import openai `
          --hidden-import configparser `
          --hidden-import output_metadata `
          --hidden-import formatters `
          --hidden-import excel_generator `
          --hidden-import data_processor `
          --hidden-import ai_client `
          --collect-all openpyxl `
          --collect-all pandas `
          --name ScheduleGenerator `
          --console `
          main.py

    - name: Create deployment package
      run: |
        mkdir deployment
        copy dist\ScheduleGenerator.exe deployment\
        copy config.ini deployment\
        copy README_CN.md deployment\
        copy WINDOWS_README.md deployment\
        xcopy prompts deployment\prompts\ /E /I
        xcopy data deployment\data\ /E /I

    - name: Create ZIP archive
      run: |
        cd deployment
        7z a -tzip ../ScheduleGenerator-Windows.zip *

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ScheduleGenerator-Windows.zip
          dist/ScheduleGenerator.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Verify all Python files exist
      run: |
        echo "Checking required Python files..."
        for file in main.py ai_client.py data_processor.py excel_generator.py formatters.py output_metadata.py; do
          if [ -f "$file" ]; then
            echo "[OK] Found: $file"
          else
            echo "[ERROR] Missing: $file"
            exit 1
          fi
        done

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install -r requirements.txt
        pip3 install pyinstaller

    - name: Verify imports work
      run: |
        echo "Testing Python imports..."
        python3 -c "import output_metadata; print('[OK] output_metadata imported')"
        python3 -c "import formatters; print('[OK] formatters imported')"
        python3 -c "import excel_generator; print('[OK] excel_generator imported')"
        python3 -c "import data_processor; print('[OK] data_processor imported')"
        python3 -c "import ai_client; print('[OK] ai_client imported')"

    - name: Build macOS executable
      run: |
        pyinstaller --onefile --clean \
          --add-data "config.ini:." \
          --add-data "prompts:prompts" \
          --add-data "data:data" \
          --hidden-import openpyxl \
          --hidden-import pandas \
          --hidden-import openai \
          --hidden-import configparser \
          --hidden-import output_metadata \
          --hidden-import formatters \
          --hidden-import excel_generator \
          --hidden-import data_processor \
          --hidden-import ai_client \
          --collect-all openpyxl \
          --collect-all pandas \
          --name ScheduleGenerator \
          --console \
          main.py

    - name: Create deployment package
      run: |
        mkdir deployment
        cp dist/ScheduleGenerator deployment/
        cp config.ini deployment/
        cp README_CN.md deployment/
        cp -r prompts deployment/
        cp -r data deployment/

    - name: Create ZIP archive
      run: |
        cd deployment
        zip -r ../ScheduleGenerator-macOS.zip *

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ScheduleGenerator-macOS.zip
          dist/ScheduleGenerator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Verify all Python files exist
      run: |
        echo "Checking required Python files..."
        for file in main.py ai_client.py data_processor.py excel_generator.py formatters.py output_metadata.py; do
          if [ -f "$file" ]; then
            echo "[OK] Found: $file"
          else
            echo "[ERROR] Missing: $file"
            exit 1
          fi
        done

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install -r requirements.txt
        pip3 install pyinstaller

    - name: Verify imports work
      run: |
        echo "Testing Python imports..."
        python3 -c "import output_metadata; print('[OK] output_metadata imported')"
        python3 -c "import formatters; print('[OK] formatters imported')"
        python3 -c "import excel_generator; print('[OK] excel_generator imported')"
        python3 -c "import data_processor; print('[OK] data_processor imported')"
        python3 -c "import ai_client; print('[OK] ai_client imported')"

    - name: Build Linux executable
      run: |
        pyinstaller --onefile --clean \
          --add-data "config.ini:." \
          --add-data "prompts:prompts" \
          --add-data "data:data" \
          --hidden-import openpyxl \
          --hidden-import pandas \
          --hidden-import openai \
          --hidden-import configparser \
          --hidden-import output_metadata \
          --hidden-import formatters \
          --hidden-import excel_generator \
          --hidden-import data_processor \
          --hidden-import ai_client \
          --collect-all openpyxl \
          --collect-all pandas \
          --name ScheduleGenerator \
          --console \
          main.py

    - name: Create deployment package
      run: |
        mkdir deployment
        cp dist/ScheduleGenerator deployment/
        cp config.ini deployment/
        cp README_CN.md deployment/
        cp -r prompts deployment/
        cp -r data deployment/

    - name: Create TAR.GZ archive
      run: |
        cd deployment
        tar -czf ../ScheduleGenerator-Linux.tar.gz *

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ScheduleGenerator-Linux.tar.gz
          dist/ScheduleGenerator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
